export_csv:
  name: Export to CSV
  description: >-
    Export entities, devices, or areas from the registry to a CSV file inside
    the Home Assistant configuration directory.
  fields:
    filename:
      name: Filename
      description: >-
        File to write, relative to the config directory. Must stay inside
        the config directory.
      required: false
      default: entity_export.csv
      example: exports/entities.csv
      selector:
        text:
    export_type:
      name: Export type
      description: What to export — one row per entity, device, or area.
      required: false
      default: entities
      selector:
        select:
          options:
            - entities
            - devices
            - areas
    include_disabled:
      name: Include disabled
      description: Include disabled entities/devices.
      required: false
      default: true
      selector:
        boolean:
    include_hidden:
      name: Include hidden
      description: Include hidden entities.
      required: false
      default: true
      selector:
        boolean:
    only_enabled:
      name: Only enabled
      description: >-
        Shortcut to exclude everything disabled or hidden (overrides the two
        options above).
      required: false
      default: false
      selector:
        boolean:
    domains:
      name: Domains
      description: >-
        Only include entities in these domains (entities export type only).
      required: false
      example: '["light", "switch"]'
      selector:
        object:
    areas:
      name: Areas
      description: Only include rows in these areas (by area id or name).
      required: false
      selector:
        object:
    stale_only:
      name: Stale only
      description: >-
        Only include stale rows (unavailable, orphaned, restored/not provided,
        or not changed within stale_days).
      required: false
      default: false
      selector:
        boolean:
    stale_days:
      name: Stale after (days)
      description: Flag rows whose state has not changed within this many days.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 3650
          unit_of_measurement: days
          mode: box

get_download_url:
  name: Get download URL
  description: >-
    Return a signed, time-limited URL to download the export directly from a
    browser (no auth header needed). Response only — does not write a file.
  fields:
    expires:
      name: Expires (seconds)
      description: How long the signed URL stays valid.
      required: false
      default: 300
      selector:
        number:
          min: 30
          max: 86400
          unit_of_measurement: seconds
          mode: box
    export_type:
